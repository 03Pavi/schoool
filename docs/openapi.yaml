openapi: 3.0.3
info:
  title: Campus School ERP API
  description: Combined API specifications for the school ERP frontend, grouped by business domain.
  version: 1.0.0
servers:
  - url: /api
    description: Next.js API Base Proxy Route
tags:
  - name: Authentication
    description: User session and login management
  - name: Students
    description: Student profiles and enrollment records
  - name: Teachers
    description: Faculty and staff rosters
  - name: Guardians
    description: Guardian profile and student relations
  - name: Subjects
    description: Subject catalog and departments
  - name: Assignments
    description: Homework issues, gradings, and lists
  - name: Fees
    description: Tuition invoicing and payment status
  - name: Library
    description: Digital library book issues and returns
  - name: Clipboard
    description: Snippet clipboard sync service
  - name: Grades
    description: Dynamic grade level configurations
  - name: Classes
    description: Classroom listings and categories
  - name: Sections
    description: Classroom section markers
  - name: Metadata
    description: Academic configurations metadata lookups
paths:
  /auth:
    post:
      summary: User Authentication Login
      description: Authenticates a user and retrieves the profile, role permissions, and session context.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: admin@erp.com
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseEnvelope'
        '400':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /students:
    get:
      summary: Fetch Students list
      description: Returns a paginated list of students. Supports search and sorting parameters.
      tags:
        - Students
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          description: List of students retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentsListResponseEnvelope'
    post:
      summary: Create a New Student
      description: Registers a new student in the system.
      tags:
        - Students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStudentPayload'
      responses:
        '201':
          description: Student created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponseEnvelope'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /students/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Unique student ID
        schema:
          type: string
    get:
      summary: Get Student details
      tags:
        - Students
      responses:
        '200':
          description: Details of the student retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponseEnvelope'
    patch:
      summary: Update Student profile
      tags:
        - Students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStudentPayload'
      responses:
        '200':
          description: Student updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponseEnvelope'
    delete:
      summary: Delete/Archive Student record
      tags:
        - Students
      responses:
        '200':
          description: Student deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponseEnvelope'

  /teachers:
    get:
      summary: Fetch Teachers list
      tags:
        - Teachers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: List of teachers retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeachersListResponseEnvelope'
    post:
      summary: Create a New Teacher Faculty Member
      tags:
        - Teachers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherInput'
      responses:
        '201':
          description: Teacher created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponseEnvelope'

  /teachers/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get Teacher details
      tags:
        - Teachers
      responses:
        '200':
          description: Details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponseEnvelope'
    patch:
      summary: Update Teacher fields
      tags:
        - Teachers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherInput'
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponseEnvelope'
    delete:
      summary: Archive Teacher record
      tags:
        - Teachers
      responses:
        '200':
          description: Archived successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponseEnvelope'

  /guardians:
    get:
      summary: Fetch Guardians List
      tags:
        - Guardians
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: List fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuardiansListResponseEnvelope'
    post:
      summary: Create a Guardian profile
      tags:
        - Guardians
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuardianInput'
      responses:
        '201':
          description: Guardian created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuardianResponseEnvelope'

  /guardians/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get Guardian details
      tags:
        - Guardians
      responses:
        '200':
          description: Details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuardianResponseEnvelope'
    patch:
      summary: Update Guardian fields
      tags:
        - Guardians
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuardianInput'
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuardianResponseEnvelope'
    delete:
      summary: Delete Guardian record
      tags:
        - Guardians
      responses:
        '200':
          description: Deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponseEnvelope'

  /academics/metadata:
    get:
      summary: Get Academic Metadata
      description: Retrieves the lists of grades, classes, sections, subjects, and teachers lookup option items.
      tags:
        - Metadata
      responses:
        '200':
          description: Metadata options retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcademicMetadataResponseEnvelope'

  /grades:
    get:
      summary: Fetch Dynamic Grades List
      description: Returns list of grade configurations mapped to classes, sections, and subjects.
      tags:
        - Grades
      responses:
        '200':
          description: Grades fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GradesResponseEnvelope'
    post:
      summary: Create Dynamic Grade Level
      description: Creates a new grade mapped to classes, sections, and subjects.
      tags:
        - Grades
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GradePayload'
      responses:
        '201':
          description: Grade created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GradeResponseEnvelope'
    patch:
      summary: Update Dynamic Grade Level
      description: Updates the class, section, and subject mappings for a grade.
      tags:
        - Grades
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GradePayload'
      responses:
        '200':
          description: Grade updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GradeResponseEnvelope'
    delete:
      summary: Delete Grade Level
      tags:
        - Grades
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Grade deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponseEnvelope'

  /classes:
    get:
      summary: Fetch Class Categories List
      tags:
        - Classes
      responses:
        '200':
          description: Classes list fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassesResponseEnvelope'
    post:
      summary: Create Class Category
      tags:
        - Classes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: Class A
      responses:
        '201':
          description: Class created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassResponseEnvelope'
    patch:
      summary: Update Class Category
      tags:
        - Classes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - name
              properties:
                id:
                  type: string
                name:
                  type: string
      responses:
        '200':
          description: Class updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassResponseEnvelope'
    delete:
      summary: Delete Class Category
      tags:
        - Classes
      responses:
        '200':
          description: Class deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponseEnvelope'

  /classes/{class_id}/sections:
    parameters:
      - name: class_id
        in: path
        required: true
        description: ID of the class this section belongs to
        schema:
          type: string
    get:
      summary: Fetch Sections Mapped to a Class
      description: Returns list of sections associated with the specified class. Sections do not exist independently.
      tags:
        - Sections
      responses:
        '200':
          description: Sections list fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionsResponseEnvelope'
    post:
      summary: Create Section Under a Class
      description: Adds a new section linked to the specified class.
      tags:
        - Sections
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: A
      responses:
        '201':
          description: Section created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionResponseEnvelope'

  /classes/{class_id}/sections/{section_id}:
    parameters:
      - name: class_id
        in: path
        required: true
        description: ID of the class this section belongs to
        schema:
          type: string
      - name: section_id
        in: path
        required: true
        description: ID of the section to manage
        schema:
          type: string
    patch:
      summary: Update Section Mapped to a Class
      tags:
        - Sections
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: B
      responses:
        '200':
          description: Section updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionResponseEnvelope'
    delete:
      summary: Delete Section from a Class
      tags:
        - Sections
      responses:
        '200':
          description: Section deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponseEnvelope'

  /subjects:
    get:
      summary: List Subjects Catalog
      tags:
        - Subjects
      parameters:
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: List fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubjectsListResponseEnvelope'
    post:
      summary: Add a new Subject
      tags:
        - Subjects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubjectInput'
      responses:
        '201':
          description: Subject created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubjectResponseEnvelope'

  /subjects/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    delete:
      summary: Delete a Subject from catalog
      tags:
        - Subjects
      responses:
        '200':
          description: Deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponseEnvelope'

  /fees:
    get:
      summary: Fetch tuition invoices ledger
      tags:
        - Fees
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of billing receipts retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeesListResponseEnvelope'
    post:
      summary: Generate tuition fee invoice
      tags:
        - Fees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeeInput'
      responses:
        '201':
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeeResponseEnvelope'

  /fees/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get single invoice detail
      tags:
        - Fees
      responses:
        '200':
          description: Details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeeResponseEnvelope'
    patch:
      summary: Update Invoice fields (e.g. status)
      tags:
        - Fees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [Paid, Unpaid, Pending]
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeeResponseEnvelope'
    delete:
      summary: Void invoice record
      tags:
        - Fees
      responses:
        '200':
          description: Voided successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponseEnvelope'

  /library:
    get:
      summary: Search catalog library books
      tags:
        - Library
      parameters:
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: Catalog list retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BooksListResponseEnvelope'
    post:
      summary: Catalog a new Book volume
      tags:
        - Library
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInput'
      responses:
        '201':
          description: Book added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookResponseEnvelope'

  /library/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get book details
      tags:
        - Library
      responses:
        '200':
          description: Book details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookResponseEnvelope'
    patch:
      summary: Update Book status (e.g. check-out / borrow)
      tags:
        - Library
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [Available, Borrowed]
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookResponseEnvelope'
    delete:
      summary: Remove book from library catalog
      tags:
        - Library
      responses:
        '200':
          description: Removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponseEnvelope'

  /assignments:
    get:
      summary: List Homework and Assignments
      tags:
        - Assignments
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentsListResponseEnvelope'
    post:
      summary: Create a Homework Assignment
      tags:
        - Assignments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentInput'
      responses:
        '201':
          description: Created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResponseEnvelope'
    patch:
      summary: Update a Homework Assignment
      tags:
        - Assignments
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResponseEnvelope'
    delete:
      summary: Delete Homework Assignment
      tags:
        - Assignments
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponseEnvelope'

  /clipboard:
    get:
      summary: List Clipboard Items
      description: Fetches a list of clipboards. Supports single fetches via query.
      tags:
        - Clipboard
      parameters:
        - name: id
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Clipboard list or single item fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClipboardListResponseEnvelope'
    post:
      summary: Create a Clipboard Item
      tags:
        - Clipboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClipboardInput'
      responses:
        '201':
          description: Created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClipboardResponseEnvelope'

  /clipboard/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get Single Clipboard Item
      tags:
        - Clipboard
      responses:
        '200':
          description: Clipboard details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClipboardResponseEnvelope'
    put:
      summary: Update Clipboard Item content
      tags:
        - Clipboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClipboardInput'
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClipboardResponseEnvelope'
    delete:
      summary: Delete Clipboard Item
      tags:
        - Clipboard
      responses:
        '200':
          description: Deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponseEnvelope'

components:
  parameters:
    Page:
      name: page
      in: query
      required: false
      description: Current pagination page index
      schema:
        type: integer
        default: 1
    Limit:
      name: limit
      in: query
      required: false
      description: Number of records to return per page
      schema:
        type: integer
        default: 10
    Search:
      name: search
      in: query
      required: false
      description: Query filter match search term
      schema:
        type: string
    Sort:
      name: sort
      in: query
      required: false
      description: Column property field to sort by
      schema:
        type: string
    Order:
      name: order
      in: query
      required: false
      description: Sort ordering direction
      schema:
        type: string
        enum: [asc, desc]
        default: asc

  schemas:
    # ACADEMIC OPTIONS & METADATA
    AcademicOption:
      type: object
      properties:
        id:
          type: string
          example: class_a
        name:
          type: string
          example: Class A

    AcademicMetadata:
      type: object
      properties:
        grades:
          type: array
          items:
            $ref: '#/components/schemas/AcademicOption'
        classes:
          type: array
          items:
            $ref: '#/components/schemas/AcademicOption'
        sections:
          type: array
          items:
            $ref: '#/components/schemas/AcademicOption'
        subjects:
          type: array
          items:
            $ref: '#/components/schemas/AcademicOption'
        teachers:
          type: array
          items:
            $ref: '#/components/schemas/AcademicOption'

    AcademicMetadataResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/AcademicMetadata'

    # GRADES
    GradePayload:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Grade 10
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
          default: ACTIVE
        class_ids:
          type: array
          items:
            type: string
          example: ["class_a", "class_b"]
        section_ids:
          type: array
          items:
            type: string
          example: ["sec_a", "sec_b"]
        subject_ids:
          type: array
          items:
            type: string
          example: ["sub_math", "sub_sci"]

    GradeRow:
      type: object
      properties:
        id:
          type: string
          example: grade_1
        name:
          type: string
          example: Grade 10
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        classes:
          type: array
          items:
            $ref: '#/components/schemas/AcademicOption'
        sections:
          type: array
          items:
            $ref: '#/components/schemas/AcademicOption'
        subjects:
          type: array
          items:
            $ref: '#/components/schemas/AcademicOption'

    GradeResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/GradeRow'

    GradesResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/GradeRow'

    # CLASSES
    ClassResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/AcademicOption'

    ClassesResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: array
          items:
